services:

  ########################################
  # INFRASTRUCTURE
  ########################################

  consul:
    image: hashicorp/consul:1.18.0
    container_name: consul
    ports:
      - "8500:8500"
    healthcheck:
      test: [ "CMD", "consul", "members" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no Zookeeper) - official Apache Kafka image env vars
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ########################################
  # DATABASES
  ########################################

  postgres-platform:
    image: postgres:15
    container_name: postgres-platform
    restart: always
    environment:
      POSTGRES_DB: moment_forever_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: groote
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d moment_forever_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-booking:
    image: postgres:15
    container_name: postgres-booking
    restart: always
    environment:
      POSTGRES_DB: moment_forever_book
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: groote
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d moment_forever_book" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:15
    container_name: postgres-payment
    restart: always
    environment:
      POSTGRES_DB: moment_forever_payment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: groote
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d moment_forever_payment" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-booking:
    image: mongo:6
    container_name: mongo-booking
    restart: always
    ports:
      - "27017:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ########################################
  # MICROSERVICES
  ########################################

  platform-service:
    build: ./forever-moment-platform
    container_name: platform-service
    ports:
      - "8080:8080"
    environment:
      - CONSUL_HOST=consul
      - POSTGRES_HOST=postgres-platform
      - MONGO_HOST=mongo-booking
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      consul:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres-platform:
        condition: service_healthy

  booking-service:
    build: ./forever-moment-booking
    container_name: booking-service
    ports:
      - "8081:8081"
    environment:
      - CONSUL_HOST=consul
      - POSTGRES_HOST=postgres-booking
      - MONGO_HOST=mongo-booking
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      consul:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres-booking:
        condition: service_healthy
      mongo-booking:
        condition: service_healthy

  payment-service:
    build: ./moment-forever-payment
    container_name: payment-service
    ports:
      - "8082:8086"
    environment:
      - CONSUL_HOST=consul
      - POSTGRES_HOST=postgres-payment
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      consul:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy

  api-gateway:
    build: ./forever-moment-gateway
    container_name: api-gateway
    ports:
      - "8086:8086"
    environment:
      - CONSUL_HOST=consul
    depends_on:
      consul:
        condition: service_healthy
      platform-service:
        condition: service_started
      booking-service:
        condition: service_started
